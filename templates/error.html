<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ error_code }} {{ error_title }}</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            font-size: 72px;
            margin: 0;
            color: #ff4444;
            font-weight: 700;
            letter-spacing: -2px;
        }
        h2 {
            margin: 10px 0 20px 0;
            font-size: 24px;
            font-weight: 400;
        }
        p {
            color: #888;
            line-height: 1.6;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #444;
            border-top: 1px solid #222;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <h1>{{ error_code }}</h1>
        <h2>{{ error_title }}</h2>
        <p>{{ error_message }}</p>
        <div class="footer">
            EdgeGuard Security &bull; nginx/1.18.0
        </div>
    </div>
</body>
</html>
