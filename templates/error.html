<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Expired</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #fff5f5;
            color: #c53030;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #fed7d7;
        }
        h1 { font-size: 60px; margin: 0; line-height: 1; }
        h2 { margin: 10px 0; font-size: 24px; color: #2d3748; }
        p { color: #718096; margin-top: 5px; }
        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            background: #c53030;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Invalid Link</h2>
        <p>The link you are trying to access is missing or invalid.</p>
        <a href="#" class="btn">Go Back</a>
    </div>
</body>
</html>
