<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ error_title }}</title>
    <style>
        html, body {
            height: 100% !important;
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden;
        }

        body {
            background-color: #1a0505;
            background: linear-gradient(135deg, #4a0000 0%, #1a0505 100%) !important;
            color: #ffcccc;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            padding: 40px;
            border: 1px solid rgba(255, 51, 51, 0.3);
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 400px;
        }

        h1 { 
            font-size: 64px; 
            margin: 0; 
            color: #ff3333; 
            font-weight: 700;
        }

        h2 {
            margin: 10px 0 5px 0;
            font-size: 24px;
            color: #ffffff;
        }

        p { 
            font-size: 16px; 
            margin-top: 10px; 
            color: #ff9999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ error_code }}</h1>
        <h2>{{ error_title }}</h2>
        <p>{{ error_message }}</p>
    </div>
</body>
</html>
